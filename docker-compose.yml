services:
  redis:
    image: redis:7-alpine
    container_name: ss_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
    env_file:
      - .env.auth
    environment:
      NEST_APP: auth-service
    ports:
      - '3001:3001'

  timbrature-service:
    build:
      context: .
    env_file:
      - .env.timbrature
    environment:
      NEST_APP: timbrature-service
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '3002:3002'

  api-gateway-bff:
    build:
      context: .
    env_file:
      - .env.gateway
    environment:
      NEST_APP: api-gateway-bff
    depends_on:
      auth-service:
        condition: service_started
      timbrature-service:
        condition: service_started
    ports:
      - '3000:3000'
